blueprint:
  name: Marstek Venus E – Simple Day/Night Controller
  description: >
    Einfacher Zweiphasen-Controller für den Marstek Venus E Heimspeicher.

    TAGMODUS (day):
      Lädt den Speicher mit dem verfügbaren PV-Überschuss auf.
      Überschuss = negativer Grid-Wert (Export ins Netz).
      Ladepower = |Grid-Export| abzüglich eines einstellbaren Puffers.
      Kein Laden wenn SOC >= Max-SOC oder kein PV-Überschuss vorhanden.

    NACHTMODUS (night):
      Entlädt den Speicher mit einem festen, per Schieberegler einstellbaren Wert.
      Kein Entladen wenn SOC <= Min-SOC.

    Voraussetzungen:
      - Grid Power Sensor: positiv = Import, negativ = Export
      - RS485-Kommunikation via Modbus/Switch in HA
      - Separate input_select-Entity zur Steuerung des Tagmodus ("Tag" / "Nacht")

  domain: automation
  homeassistant:
    min_version: 2023.9.0

  input:

    # ── Aktivierung ────────────────────────────────────────────────────────────
    enabled_entity:
      name: Steuerung aktiv (input_boolean)
      description: Schaltet den gesamten Blueprint ein/aus.
      selector:
        entity:
          domain: input_boolean

    # ── Modus-Auswahl ──────────────────────────────────────────────────────────
    day_night_helper:
      name: Tag/Nacht-Modus (input_select)
      description: >
        input_select mit mind. zwei Optionen.
        Welche Texte "Tag" und "Nacht" entsprechen, wird unten konfiguriert.
      selector:
        entity:
          domain: input_select

    day_value:
      name: Wert für Tagmodus
      default: "Tag"
      selector:
        text: {}

    night_value:
      name: Wert für Nachtmodus
      default: "Nacht"
      selector:
        text: {}

    # ── Sensoren ───────────────────────────────────────────────────────────────
    grid_power_sensor:
      name: Netzleistung-Sensor
      description: Positiv = Import aus dem Netz, Negativ = Export ins Netz.
      selector:
        entity:
          domain: sensor

    battery_soc_sensor:
      name: Batterie SOC Sensor (%)
      selector:
        entity:
          domain: sensor

    pv_power_sensor:
      name: PV-Leistung Sensor (W)
      description: Wird genutzt um sicherzustellen dass PV aktiv ist.
      selector:
        entity:
          domain: sensor

    # ── Marstek Geräte-Entities ────────────────────────────────────────────────
    rs485_switch_entity:
      name: RS485 Control Switch
      description: Switch der die RS485/Modbus-Verbindung aktiviert.
      selector:
        entity:
          domain: switch

    strategy_select_entity:
      name: Marstek Strategy Select
      description: Select-Entity für die Betriebsstrategie (z.B. "manual").
      selector:
        entity:
          domain: select

    action_select_entity:
      name: Marstek Force Mode Select
      description: Select-Entity für den Erzwingungsmodus (charge/discharge/stop).
      selector:
        entity:
          domain: select

    charge_power_entity:
      name: Marstek Charge Power (number)
      selector:
        entity:
          domain: number

    discharge_power_entity:
      name: Marstek Discharge Power (number)
      selector:
        entity:
          domain: number

    # ── Geräte-Werte (Strings) ─────────────────────────────────────────────────
    device_manual_value:
      name: Gerätewert für manuellen Modus
      default: "manual"
      selector:
        text: {}

    device_stop_value:
      name: Gerätewert für Stop / Hold
      default: "stop"
      selector:
        text: {}

    device_charge_value:
      name: Gerätewert für Laden
      default: "charge"
      selector:
        text: {}

    device_discharge_value:
      name: Gerätewert für Entladen
      default: "discharge"
      selector:
        text: {}

    # ── Tagmodus-Parameter ─────────────────────────────────────────────────────
    export_threshold:
      name: Mindest-Überschuss zum Starten des Ladens (W)
      description: >
        Erst wenn der Grid-Export diesen Wert überschreitet, wird geladen.
        Verhindert Pendeln bei kleinen Schwankungen.
      default: 50
      selector:
        number:
          min: 0
          max: 500
          step: 10
          unit_of_measurement: "W"

    charge_buffer:
      name: Ladepuffer – Reserve im Netz-Export (W)
      description: >
        Dieser Betrag wird vom verfügbaren Export abgezogen bevor die
        Ladeleistung gesetzt wird. So bleibt ein kleiner Export-Puffer.
      default: 30
      selector:
        number:
          min: 0
          max: 200
          step: 10
          unit_of_measurement: "W"

    max_charge_power:
      name: Maximale Ladeleistung (W)
      default: 1200
      selector:
        number:
          min: 100
          max: 3000
          step: 50
          unit_of_measurement: "W"

    soc_max:
      name: Maximaler SOC für Laden (%)
      description: Über diesem Wert wird nicht mehr geladen.
      default: 95
      selector:
        number:
          min: 50
          max: 100
          step: 1
          unit_of_measurement: "%"

    min_pv_power:
      name: Mindest-PV-Leistung für Laden (W)
      description: Unter diesem Wert wird kein Laden gestartet (z.B. bei Bewölkung).
      default: 100
      selector:
        number:
          min: 0
          max: 500
          step: 10
          unit_of_measurement: "W"

    # ── Nachtmodus-Parameter ───────────────────────────────────────────────────
    night_discharge_power:
      name: Feste Entladeleistung nachts (W) – Schieberegler
      description: >
        Mit diesem Schieberegler stellst du ein, mit welcher konstanten Leistung
        der Speicher nachts ins Haus entladen soll.
      default: 200
      selector:
        number:
          min: 0
          max: 2000
          step: 50
          unit_of_measurement: "W"

    soc_min:
      name: Minimaler SOC für Entladen (%)
      description: Unter diesem Wert wird nachts nicht mehr entladen.
      default: 10
      selector:
        number:
          min: 0
          max: 50
          step: 1
          unit_of_measurement: "%"

    max_discharge_power:
      name: Maximale Entladeleistung (W)
      default: 800
      selector:
        number:
          min: 100
          max: 3000
          step: 50
          unit_of_measurement: "W"

    # ── Allgemeine Parameter ───────────────────────────────────────────────────
    min_write_delta:
      name: Minimale Änderung vor Schreibvorgang (W)
      description: >
        Verhindert unnötige Schreibzugriffe wenn sich die Zielleistung
        kaum geändert hat. Reduziert RS485-Traffic.
      default: 20
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "W"

# ── Automation ────────────────────────────────────────────────────────────────
mode: queued
max: 2
max_exceeded: silent

trigger:
  - platform: time_pattern
    seconds: "/10"

  - platform: state
    entity_id: !input day_night_helper

  - platform: state
    entity_id: !input enabled_entity

  - platform: homeassistant
    event: start

action:
  # ══════════════════════════════════════════════════════════════════════════════
  # SCHRITT 1: Blueprint-Inputs als einfache Variablen bereitstellen
  #
  # REGEL: !input darf NIE innerhalb von {{ }} benutzt werden!
  # Lösung: Erst alle !input-Werte in var_*-Variablen schreiben,
  #         dann nur noch die Variablen in Jinja2-Templates nutzen.
  # ══════════════════════════════════════════════════════════════════════════════
  - variables:
      # Entity-IDs
      var_enabled_entity:    !input enabled_entity
      var_day_night_helper:  !input day_night_helper
      var_grid_sensor:       !input grid_power_sensor
      var_soc_sensor:        !input battery_soc_sensor
      var_pv_sensor:         !input pv_power_sensor
      var_rs485_switch:      !input rs485_switch_entity
      var_strategy_select:   !input strategy_select_entity
      var_action_select:     !input action_select_entity
      var_charge_entity:     !input charge_power_entity
      var_discharge_entity:  !input discharge_power_entity
      # Konfigurations-Strings
      var_day_value:         !input day_value
      var_night_value:       !input night_value
      var_manual_value:      !input device_manual_value
      var_stop_value:        !input device_stop_value
      var_charge_value:      !input device_charge_value
      var_discharge_value:   !input device_discharge_value
      # Numerische Parameter
      var_export_threshold:      !input export_threshold
      var_charge_buffer:         !input charge_buffer
      var_max_charge_power:      !input max_charge_power
      var_soc_max:               !input soc_max
      var_min_pv_power:          !input min_pv_power
      var_night_discharge_power: !input night_discharge_power
      var_soc_min:               !input soc_min
      var_max_discharge_power:   !input max_discharge_power
      var_min_write_delta:       !input min_write_delta

  # ══════════════════════════════════════════════════════════════════════════════
  # SCHRITT 2: Zustand lesen & Entscheidungslogik berechnen
  # Ab hier ausschliesslich var_*-Variablen in Templates verwenden.
  # ══════════════════════════════════════════════════════════════════════════════
  - variables:
      enabled:   "{{ is_state(var_enabled_entity, 'on') }}"
      mode_raw:  "{{ states(var_day_night_helper) }}"
      is_day:    "{{ mode_raw == var_day_value }}"
      is_night:  "{{ mode_raw == var_night_value }}"

      grid_power:        "{{ states(var_grid_sensor) | float(0) }}"
      soc:               "{{ states(var_soc_sensor) | float(0) }}"
      pv_power:          "{{ states(var_pv_sensor) | float(0) }}"
      current_charge:    "{{ states(var_charge_entity) | float(0) }}"
      current_discharge: "{{ states(var_discharge_entity) | float(0) }}"

      sensor_valid: >
        {{ states(var_grid_sensor) not in ['unknown','unavailable','none','']
           and states(var_soc_sensor) not in ['unknown','unavailable','none',''] }}

      # Überschuss ins Netz (grid negativ = Export → positiver Export-Wert)
      grid_export: "{{ [0 - grid_power, 0] | max }}"

      # Ladeziel: Export minus Puffer, begrenzt auf Maximum
      raw_charge_target: "{{ [grid_export - var_charge_buffer, 0] | max }}"
      charge_target:     "{{ [raw_charge_target, var_max_charge_power] | min | round(0) | int }}"

      # Entladeziel: fester Wert, begrenzt auf Maximum
      discharge_target: "{{ [var_night_discharge_power, var_max_discharge_power] | min | round(0) | int }}"

      # Freigaben
      can_charge: >
        {{ soc < var_soc_max
           and pv_power >= var_min_pv_power
           and grid_export >= var_export_threshold }}

      can_discharge: "{{ soc > var_soc_min }}"

      # Endentscheidung
      final_action: >
        {% if not enabled or not sensor_valid %}
          stop
        {% elif is_day %}
          {% if can_charge %}charge{% else %}stop{% endif %}
        {% elif is_night %}
          {% if can_discharge %}discharge{% else %}stop{% endif %}
        {% else %}
          stop
        {% endif %}

      # Gerätewert für den Force-Mode-Select
      device_action_value: >
        {% if final_action == 'charge' %}
          {{ var_charge_value }}
        {% elif final_action == 'discharge' %}
          {{ var_discharge_value }}
        {% else %}
          {{ var_stop_value }}
        {% endif %}

  # ── Schritt 3: Abbrechen wenn deaktiviert oder Sensoren ungültig ─────────────
  - condition: template
    value_template: "{{ enabled and sensor_valid }}"

  # ── Schritt 4: RS485 einschalten falls nötig ──────────────────────────────────
  - if:
      - condition: template
        value_template: "{{ not is_state(var_rs485_switch, 'on') }}"
    then:
      - service: switch.turn_on
        target:
          entity_id: !input rs485_switch_entity
      - delay:
          milliseconds: 500

  # ── Schritt 5: Strategy auf "manual" – nur schreiben wenn nötig ──────────────
  - if:
      - condition: template
        value_template: "{{ not is_state(var_strategy_select, var_manual_value) }}"
    then:
      - service: select.select_option
        target:
          entity_id: !input strategy_select_entity
        data:
          option: "{{ var_manual_value }}"
      - delay:
          milliseconds: 300

  # ── Schritt 6: Force Mode setzen – nur wenn nötig ────────────────────────────
  - if:
      - condition: template
        value_template: "{{ not is_state(var_action_select, device_action_value) }}"
    then:
      - service: select.select_option
        target:
          entity_id: !input action_select_entity
        data:
          option: "{{ device_action_value }}"
      - delay:
          milliseconds: 200

  # ── Schritt 7: Leistungswerte schreiben ───────────────────────────────────────
  - choose:

      # TAGMODUS: Laden
      - conditions:
          - condition: template
            value_template: "{{ final_action == 'charge' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ current_discharge | abs >= var_min_write_delta }}"
            then:
              - service: number.set_value
                target:
                  entity_id: !input discharge_power_entity
                data:
                  value: 0
          - if:
              - condition: template
                value_template: "{{ (current_charge - charge_target) | abs >= var_min_write_delta }}"
            then:
              - service: number.set_value
                target:
                  entity_id: !input charge_power_entity
                data:
                  value: "{{ charge_target }}"

      # NACHTMODUS: Entladen
      - conditions:
          - condition: template
            value_template: "{{ final_action == 'discharge' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ current_charge | abs >= var_min_write_delta }}"
            then:
              - service: number.set_value
                target:
                  entity_id: !input charge_power_entity
                data:
                  value: 0
          - if:
              - condition: template
                value_template: "{{ (current_discharge - discharge_target) | abs >= var_min_write_delta }}"
            then:
              - service: number.set_value
                target:
                  entity_id: !input discharge_power_entity
                data:
                  value: "{{ discharge_target }}"

      # STOP: Alles auf 0
      - conditions:
          - condition: template
            value_template: "{{ final_action == 'stop' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ current_charge | abs >= var_min_write_delta }}"
            then:
              - service: number.set_value
                target:
                  entity_id: !input charge_power_entity
                data:
                  value: 0
          - if:
              - condition: template
                value_template: "{{ current_discharge | abs >= var_min_write_delta }}"
            then:
              - service: number.set_value
                target:
                  entity_id: !input discharge_power_entity
                data:
                  value: 0
